<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MACRO SIGNAL</title>

<style>
body {
  background:#060810;
  color:#fff;
  font-family:sans-serif;
  max-width:420px;
  margin:0 auto;
}
.card {
  background:#111526;
  padding:14px;
  border-radius:10px;
  margin:10px;
}
.title {
  font-size:13px;
  color:#aaa;
}
.value {
  font-size:20px;
  margin-top:6px;
}
</style>
</head>

<body>

<h2 style="padding:10px">MACRO SIGNAL</h2>

<div class="card">
  <div class="title">지급준비금</div>
  <div class="value" id="res">로딩중...</div>
</div>

<div class="card">
  <div class="title">TGA</div>
  <div class="value" id="tga">로딩중...</div>
</div>

<div class="card">
  <div class="title">RRP</div>
  <div class="value" id="rrp">로딩중...</div>
</div>

<div class="card">
  <div class="title">VIX</div>
  <div class="value" id="vix">로딩중...</div>
</div>

<div class="card">
  <div class="title">금리</div>
  <div class="value" id="rate">로딩중...</div>
</div>

<script>
const KEY = 'd1593f93a0ca45195a187f8d476c9fa5';

/* ── 안전 fetch (CORS 대응) ── */
async function safeFetch(url){
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    return await res.json();
  } catch (e) {
    try {
      const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
      const res = await fetch(proxy);
      return await res.json();
    } catch {
      return null;
    }
  }
}

/* ── FRED 가져오기 ── */
async function get(series){
  const url = `https://api.stlouisfed.org/fred/series/observations?series_id=${series}&api_key=${KEY}&file_type=json&limit=10`;

  const json = await safeFetch(url);
  if (!json || !json.observations) return null;

  return json.observations
    .filter(o => o.value !== '.' && o.value !== '')
    .sort((a,b)=> new Date(b.date) - new Date(a.date)); // 최신순
}

/* ── 값 표시 ── */
function setText(id, text){
  document.getElementById(id).textContent = text;
}

/* ── 실행 ── */
async function run(){

  // 지급준비금
  try{
    const d = await get('WRESBAL');
    if (!d || !d[0]) return setText('res','N/A');
    setText('res', (parseFloat(d[0].value)/1e6).toFixed(2)+'T');
  }catch{ setText('res','ERR'); }

  // TGA
  try{
    const d = await get('WTREGEN');
    if (!d || !d[0]) return setText('tga','N/A');
    setText('tga', (parseFloat(d[0].value)/1e6).toFixed(2)+'T');
  }catch{ setText('tga','ERR'); }

  // RRP
  try{
    const d = await get('RRPONTSYD');
    if (!d || !d[0]) return setText('rrp','N/A');
    setText('rrp', (parseFloat(d[0].value)/1e3).toFixed(2)+'T');
  }catch{ setText('rrp','ERR'); }

  // VIX
  try{
    const d = await get('VIXCLS');
    if (!d || !d[0]) return setText('vix','N/A');
    setText('vix', parseFloat(d[0].value).toFixed(1));
  }catch{ setText('vix','ERR'); }

  // 금리
  try{
    const d = await get('DFF');
    if (!d || !d[0]) return setText('rate','N/A');
    setText('rate', parseFloat(d[0].value).toFixed(2)+'%');
  }catch{ setText('rate','ERR'); }

}

run();
</script>

</body>
</html>
