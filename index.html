<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MACRO SIGNAL</title>

<style>
body {
  background:#060810;
  color:white;
  font-family:sans-serif;
  max-width:420px;
  margin:0 auto;
}
.section { margin:20px 10px; }
.card {
  background:#111526;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h2 style="padding:10px">MACRO SIGNAL</h2>

<div class="section">
  <div class="card">지급준비금: <span id="res">로딩중...</span></div>
  <div class="card">TGA: <span id="tga">로딩중...</span></div>
  <div class="card">RRP: <span id="rrp">로딩중...</span></div>
</div>

<div class="section">
  <div class="card">VIX: <span id="vix">로딩중...</span></div>
  <div class="card">금리: <span id="rate">로딩중...</span></div>
</div>

<script>
const KEY = 'd1593f93a0ca45195a187f8d476c9fa5';

/* ── CORS 대응 fetch ── */
async function safeFetch(url){
  try{
    const r = await fetch(url);
    if(!r.ok) throw new Error();
    return await r.json();
  }catch(e){
    const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
    const r = await fetch(proxy);
    return await r.json();
  }
}

/* ── FRED ── */
async function get(series){
  const url = `https://api.stlouisfed.org/fred/series/observations?series_id=${series}&api_key=${KEY}&file_type=json&sort_order=desc&limit=2`;
  const j = await safeFetch(url);
  return j.observations?.filter(o=>o.value!=".") || null;
}

/* ── 실행 ── */
async function run(){

  // 지급준비금
  try{
    const d = await get('WRESBAL');
    document.getElementById('res').textContent =
      d ? (d[0].value/1e6).toFixed(2)+'T' : 'N/A';
  }catch{ document.getElementById('res').textContent='에러'; }

  // TGA
  try{
    const d = await get('WTREGEN');
    document.getElementById('tga').textContent =
      d ? (d[0].value/1e6).toFixed(2)+'T' : 'N/A';
  }catch{ document.getElementById('tga').textContent='에러'; }

  // RRP
  try{
    const d = await get('RRPONTSYD');
    document.getElementById('rrp').textContent =
      d ? (d[0].value/1e3).toFixed(2)+'T' : 'N/A';
  }catch{ document.getElementById('rrp').textContent='에러'; }

  // VIX
  try{
    const d = await get('VIXCLS');
    document.getElementById('vix').textContent =
      d ? parseFloat(d[0].value).toFixed(1) : 'N/A';
  }catch{ document.getElementById('vix').textContent='에러'; }

  // 금리
  try{
    const d = await get('DFF');
    document.getElementById('rate').textContent =
      d ? parseFloat(d[0].value).toFixed(2)+'%' : 'N/A';
  }catch{ document.getElementById('rate').textContent='에러'; }

}

run();
</script>

</body>
</html>
